<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Copilot Chat</title>
  <link rel="stylesheet" href="/static/css/styles.css" />
</head>
<body>
  <div class="app-shell">

    <!-- Header -->
    <header class="app-header">
      <div class="app-header__brand">
        <svg class="app-header__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
        <h1 class="app-header__title">Copilot Chat</h1>
      </div>
      <div class="app-header__actions">
        <div class="mode-toggle" role="radiogroup" aria-label="Response mode">
          <label class="mode-toggle__label">
            <input class="mode-toggle__input" type="radio" name="responseMode" value="stream" checked />
            <span class="mode-toggle__text">Stream</span>
          </label>
          <label class="mode-toggle__label">
            <input class="mode-toggle__input" type="radio" name="responseMode" value="non-stream" />
            <span class="mode-toggle__text">Sync</span>
          </label>
        </div>
        <span id="modeBadge" class="badge"><span class="badge__dot"></span> Streaming</span>
      </div>
    </header>

    <!-- Chat messages -->
    <section id="chatPanel" class="chat-panel" aria-label="Chat messages">
      <div class="message message--system">Connected &mdash; ask a question to begin.</div>
    </section>

    <!-- Composer -->
    <div class="composer">
      <textarea id="messageInput" class="composer__input" placeholder="Type a message..." rows="1"></textarea>
      <button id="sendBtn" class="composer__send" type="button">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
        Send
      </button>
    </div>
    <div id="status" class="status-bar"></div>

  </div>

  <!-- Vendor libs -->
  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <!-- App modules (order matters: dependencies first) -->
  <script src="/static/js/chat/markdown.js"></script>
  <script src="/static/js/chat/ui.js"></script>
  <script src="/static/js/chat/stream.js"></script>
  <script src="/static/js/chat/api.js"></script>
  <script src="/static/js/chat/app.js"></script>
</body>
</html>
